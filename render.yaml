services:
  - type: web
    name: eternal-kingdoms
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false

    headers:
      - path: /unity/Build/*.wasm
        name: Content-Type
        value: application/wasm
      - path: /unity/Build/*.data
        name: Content-Type
        value: application/octet-stream
      - path: /unity/Build/*.js
        name: Content-Type
        value: application/javascript
      - path: /unity/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/**
        name: Cache-Control
        value: public, max-age=86400

    routes:
      - type: rewrite
        source: /unity/*
        destination: /unity/:splat
