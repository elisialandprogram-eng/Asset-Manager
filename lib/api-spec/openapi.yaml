openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Eternal Kingdoms API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: kingdoms
    description: Kingdom management
  - name: buildings
    description: Building management
  - name: resources
    description: Resource management
  - name: assets
    description: Asset registry
  - name: worlds
    description: World and map data
  - name: marches
    description: March creation, listing, and cancellation
  - name: admin
    description: Admin-only management endpoints (requires admin role)
  - name: heroes
    description: Hero inventory and management
  - name: troops
    description: Troop inventory and definitions (T1-T5)
  - name: hospital
    description: Hospital wounded tracking and healing
  - name: reports
    description: Battle report history
  - name: combat
    description: PvE monster attack flow

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/mine:
    get:
      operationId: getMyKingdom
      tags: [kingdoms]
      summary: Get the authenticated user's kingdom
      responses:
        "200":
          description: User's kingdom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kingdom"
        "404":
          description: Kingdom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/{id}:
    get:
      operationId: getKingdom
      tags: [kingdoms]
      summary: Get a kingdom by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kingdom details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kingdom"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/{id}/summary:
    get:
      operationId: getKingdomSummary
      tags: [kingdoms]
      summary: Get a kingdom's dashboard summary (resources, buildings, troops)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kingdom summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KingdomSummary"

  /kingdoms/{id}/buildings:
    get:
      operationId: getKingdomBuildings
      tags: [buildings]
      summary: Get all buildings in a kingdom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of buildings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Building"

  /kingdoms/{id}/resources:
    get:
      operationId: getKingdomResources
      tags: [resources]
      summary: Get current resources for a kingdom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kingdom resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resources"

  /kingdoms/{id}/state:
    get:
      operationId: getKingdomState
      tags: [kingdoms]
      summary: Full authoritative game state for a kingdom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complete kingdom game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KingdomState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/{id}/queue:
    get:
      operationId: getKingdomQueue
      tags: [kingdoms]
      summary: Get active upgrade queue for a kingdom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active upgrade queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpgradeQueueItem"

  /buildings/{buildingId}/upgrade:
    post:
      operationId: upgradeBuilding
      tags: [buildings]
      summary: Queue a building upgrade
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Upgrade started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeResponse"
        "402":
          description: Insufficient resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientResourcesError"
        "409":
          description: Cannot upgrade (already upgrading or max level)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /buildings/{buildingId}/upgrade-preview:
    get:
      operationId: getUpgradePreview
      tags: [buildings]
      summary: Preview cost and duration of next upgrade without committing
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Upgrade preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradePreview"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all assets in the registry
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [building, troop, monster, dragon, skin, terrain, ui]
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

  /assets/{assetId}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get a single asset by its registry ID
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /worlds:
    get:
      operationId: listWorlds
      tags: [worlds]
      summary: List all active worlds
      responses:
        "200":
          description: World list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/World"

  /worlds/{worldId}/map:
    get:
      operationId: getWorldMap
      tags: [worlds]
      summary: Get full world map data including kingdoms, monster spawns, and crystal nodes
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full world map data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldMapData"
        "404":
          description: World not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /worlds/{worldId}/kingdoms:
    get:
      operationId: getWorldKingdoms
      tags: [worlds]
      summary: List all kingdoms in a world with map positions
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kingdom list with positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KingdomMapEntry"

  /worlds/{worldId}/spawns:
    get:
      operationId: getWorldSpawns
      tags: [worlds]
      summary: List all monster spawns in a world
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monster spawn list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonsterSpawnFull"

  /worlds/{worldId}/place-kingdom:
    post:
      operationId: devPlaceKingdom
      tags: [worlds]
      summary: Place a kingdom at specific map coordinates (DEV ONLY — admin role required)
      security:
        - bearerAuth: []
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceKingdomInput"
      responses:
        "200":
          description: Kingdom placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceKingdomResponse"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kingdom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /worlds/{worldId}/active-spawns:
    get:
      operationId: getWorldActiveSpawns
      tags: [worlds]
      summary: Get all active world spawns (resource nodes + monster camps) for a world
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active world spawns with expiry timestamps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSpawnsResponse"
        "400":
          description: Invalid world ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/spawns/stats:
    get:
      operationId: getAdminSpawnsStats
      tags: [admin]
      summary: Get aggregate spawn statistics for a world (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: worldId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spawn statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpawnStats"
        "400":
          description: worldId is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/spawns/generate:
    post:
      operationId: postAdminSpawnsGenerate
      tags: [admin]
      summary: Trigger an immediate spawn cycle for a world (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnActionRequest"
      responses:
        "200":
          description: Spawn cycle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpawnGenerateResponse"
        "400":
          description: worldId is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/spawns/reset:
    post:
      operationId: postAdminSpawnsReset
      tags: [admin]
      summary: Delete all spawns for a world and regenerate from scratch (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnActionRequest"
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpawnResetResponse"
        "400":
          description: worldId is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/spawns/cleanup:
    post:
      operationId: postAdminSpawnsCleanup
      tags: [admin]
      summary: Delete stale expired/depleted spawn rows older than 1 hour (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnActionRequest"
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpawnCleanupResponse"
        "400":
          description: worldId is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/{id}/construction-queue:
    get:
      operationId: getConstructionQueue
      tags: [buildings]
      summary: Get active new-building construction queue for a kingdom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active construction queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConstructionQueueItem"
        "404":
          description: Kingdom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/{id}/construction-options:
    get:
      operationId: getConstructionOptions
      tags: [buildings]
      summary: Get available building types to construct with costs and slot availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Construction options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionOptions"
        "404":
          description: Kingdom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kingdoms/{id}/construct:
    post:
      operationId: constructBuilding
      tags: [buildings]
      summary: Start construction of a new building
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConstructBuildingInput"
      responses:
        "202":
          description: Construction started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionResponse"
        "402":
          description: Insufficient resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientResourcesError"
        "409":
          description: Slot limit reached or palace tier insufficient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kingdom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /marches:
    post:
      operationId: createMarch
      tags: [marches]
      summary: Create a gather march
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarchCreateBody"
      responses:
        "201":
          description: March created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarchCreateResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not your kingdom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kingdom or spawn not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listMarches
      tags: [marches]
      summary: List active marches for a kingdom
      security:
        - bearerAuth: []
      parameters:
        - name: kingdomId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active marches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarchListResult"

  /marches/{id}:
    delete:
      operationId: cancelMarch
      tags: [marches]
      summary: Cancel (recall) an outbound march
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: March recalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: March not in outbound state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /worlds/{worldId}/resource-nodes:
    get:
      operationId: getResourceNodes
      tags: [worlds]
      summary: Get active resource nodes in a world
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active resource nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceNodesResponse"

  /worlds/{worldId}/monster-nodes:
    get:
      operationId: getMonsterNodes
      tags: [worlds]
      summary: Get active monster spawn nodes in a world
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active monster nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonsterNodesResponse"

  # ── Phase 4: Heroes ────────────────────────────────────────────────────────

  /heroes:
    get:
      operationId: listHeroes
      tags: [heroes]
      summary: List heroes for a kingdom
      parameters:
        - name: kingdomId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hero list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroListResponse"

  /heroes/{id}:
    get:
      operationId: getHero
      tags: [heroes]
      summary: Get a single hero
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hero detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroResponse"

  # ── Phase 4: Troops ────────────────────────────────────────────────────────

  /troops:
    get:
      operationId: getTroopInventory
      tags: [troops]
      summary: Get troop counts for a kingdom
      parameters:
        - name: kingdomId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Troop counts keyed by TroopKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TroopInventoryResponse"

  /troops/definitions:
    get:
      operationId: getTroopDefinitions
      tags: [troops]
      summary: Get all T1-T5 troop stat definitions
      responses:
        "200":
          description: Troop definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TroopDefinitionsResponse"

  # ── Phase 4: Hospital ──────────────────────────────────────────────────────

  /hospital:
    get:
      operationId: getHospital
      tags: [hospital]
      summary: Get hospital state (wounded troop counts with lazy heal applied)
      parameters:
        - name: kingdomId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hospital state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalResponse"

  # ── Phase 4: Battle Reports ────────────────────────────────────────────────

  /reports:
    get:
      operationId: listBattleReports
      tags: [reports]
      summary: List battle reports for a kingdom
      parameters:
        - name: kingdomId
          in: query
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated battle reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleReportListResponse"

  /reports/{id}:
    get:
      operationId: getBattleReport
      tags: [reports]
      summary: Get a single battle report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Battle report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleReportResponse"

  # ── Phase 4: Combat (PvE monster attack) ──────────────────────────────────

  /monsters/{spawnId}:
    get:
      operationId: getMonsterSpawn
      tags: [combat]
      summary: Get monster spawn info + AP cost for attacking
      parameters:
        - name: spawnId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monster spawn detail with AP cost
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonsterSpawnDetailResponse"

  /monsters/{spawnId}/attack:
    post:
      operationId: attackMonster
      tags: [combat]
      summary: Send troops to attack a monster spawn (creates an attack_monster march)
      parameters:
        - name: spawnId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttackMarchRequest"
      responses:
        "201":
          description: March created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttackMarchResponse"
        "400":
          description: Validation error (bad troops, insufficient AP, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Phase 4: Action Points ────────────────────────────────────────────────

  /kingdoms/{id}/ap:
    get:
      operationId: getKingdomAP
      tags: [combat]
      summary: Get current action points for a kingdom (lazy regen applied)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current and max AP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionPointResponse"

  # ── Phase 4: Inventory ────────────────────────────────────────────────────

  /inventory:
    get:
      operationId: getInventory
      tags: [combat]
      summary: Get item inventory for a kingdom
      parameters:
        - name: kingdomId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item inventory keyed by itemKey
          content:
            application/json:
              schema:
                type: object
                required: [kingdomId, items]
                properties:
                  kingdomId:
                    type: integer
                  items:
                    type: object
                    additionalProperties:
                      type: integer

