<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eternal Kingdoms</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #d4a017;
    font-family: Georgia, 'Times New Roman', serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #boot {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  #boot-title { font-size: 2rem; color: #d4a017; letter-spacing: 2px; }
  #boot-bar-wrap {
    width: 280px; height: 6px; background: #1a1a1a; border-radius: 3px;
    border: 1px solid #3a2a00;
  }
  #boot-bar {
    height: 100%; width: 0%; background: #d4a017;
    border-radius: 3px; transition: width 0.08s linear;
  }
  #boot-label { font-size: 0.75rem; color: #7a6010; letter-spacing: 1px; font-family: monospace; }

  #game {
    display: none;
    width: 100vw; height: 100vh;
    position: relative;
    background: radial-gradient(ellipse at 50% 60%, #0f1a0f 0%, #050a05 70%, #020402 100%);
  }

  canvas#world {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
    pointer-events: none;
  }
  #hud-left { display: flex; align-items: center; gap: 10px; }
  #hud-crown { font-size: 1.1rem; }
  #hud-name { font-size: 0.9rem; color: #d4a017; letter-spacing: 1px; }
  #hud-res {
    display: flex; gap: 16px; font-size: 0.7rem;
    font-family: monospace; color: #8a7020;
  }
  #hud-res span { color: #c49010; }

  #badge {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,8,0,0.7); border: 1px solid #3a2a00;
    padding: 8px 20px; border-radius: 6px;
    font-size: 0.7rem; color: #6a5010; font-family: monospace; letter-spacing: 1px;
    pointer-events: none;
  }

  #tooltip {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; color: #4a3a08; font-family: monospace;
    letter-spacing: 1px; pointer-events: none;
  }
</style>
</head>
<body>

<!-- Boot screen -->
<div id="boot">
  <div id="boot-title">⚔ ETERNAL KINGDOMS</div>
  <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
  <div id="boot-label">INITIALISING WORLD ENGINE…</div>
</div>

<!-- Game view -->
<div id="game">
  <canvas id="world"></canvas>
  <div id="hud">
    <div id="hud-left">
      <span id="hud-crown">👑</span>
      <span id="hud-name">—</span>
    </div>
    <div id="hud-res">
      GOLD <span id="r-gold">—</span> &nbsp;
      FOOD <span id="r-food">—</span> &nbsp;
      WOOD <span id="r-wood">—</span> &nbsp;
      STONE <span id="r-stone">—</span>
    </div>
  </div>
  <div id="tooltip">PLACEHOLDER BUILD · DEPLOY UNITY WEBGL TO REPLACE</div>
  <div id="badge">AUTH ✓ · WORLD READY · UNITY CLIENT PLACEHOLDER v0.1</div>
</div>

<script>
(function () {
  /* ── boot progress bar ── */
  var bar = document.getElementById('boot-bar');
  var label = document.getElementById('boot-label');
  var pct = 0;
  var stages = [
    [20,  'LOADING ASSETS…'],
    [45,  'BUILDING TERRAIN…'],
    [65,  'SPAWNING MONSTERS…'],
    [80,  'CONNECTING TO REALM…'],
    [95,  'AUTHENTICATING…'],
    [100, 'READY'],
  ];
  var stageIdx = 0;

  var tick = setInterval(function () {
    pct = Math.min(pct + (Math.random() * 3 + 1), 100);
    bar.style.width = pct + '%';
    while (stageIdx < stages.length && pct >= stages[stageIdx][0]) {
      label.textContent = stages[stageIdx][1];
      stageIdx++;
    }
    if (pct >= 100) {
      clearInterval(tick);
      setTimeout(bootComplete, 300);
    }
  }, 60);

  function bootComplete() {
    /* Signal parent React app */
    window.parent.postMessage({ type: 'UNITY_READY' }, '*');

    /* Show game canvas */
    document.getElementById('boot').style.display = 'none';
    var game = document.getElementById('game');
    game.style.display = 'block';
    startWorldRenderer();
  }

  /* ── receive auth from parent ── */
  var authData = null;
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'UNITY_AUTH') {
      authData = e.data;
      if (authData.userId) {
        document.getElementById('hud-name').textContent =
          'KINGDOM #' + authData.userId;
      }
      /* In the real build this would bootstrap the game session */
      console.log('[Unity] Auth received, userId=' + authData.userId);
    }
  });

  /* ── isometric world renderer (canvas 2D placeholder) ── */
  function startWorldRenderer() {
    var canvas = document.getElementById('world');
    var ctx = canvas.getContext('2d');
    var W, H, t = 0;

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /* Tile grid */
    var TILE_W = 64, TILE_H = 32;
    var COLS = 24, ROWS = 24;

    var palette = {
      grass:  ['#1a2e10','#1e3512','#223d14','#1c3111'],
      dark:   ['#0d1a08','#0f1e09'],
      water:  ['#0a1520','#0c1a28'],
      path:   ['#2a2010','#2e2412'],
      stone:  ['#1e1e1e','#222222'],
    };

    function tileType(col, row) {
      var n = Math.sin(col * 0.7 + row * 0.5) * Math.cos(col * 0.3 - row * 0.8);
      if (n > 0.5)  return 'water';
      if (n > 0.2)  return 'path';
      if (n < -0.5) return 'stone';
      return 'grass';
    }

    function isoX(col, row) { return (col - row) * (TILE_W / 2) + W / 2; }
    function isoY(col, row) { return (col + row) * (TILE_H / 2) + H / 5; }

    var buildings = [];
    for (var i = 0; i < 12; i++) {
      buildings.push({
        col: 6 + Math.floor(Math.random() * 12),
        row: 6 + Math.floor(Math.random() * 12),
        h:   20 + Math.random() * 40,
        hue: Math.random() > 0.5 ? '#8a6020' : '#4a5060',
      });
    }

    /* Particles */
    var particles = [];
    for (var p = 0; p < 40; p++) {
      particles.push({ x: Math.random(), y: Math.random() + 0.3,
                       vx: (Math.random()-0.5)*0.0002,
                       vy: -Math.random()*0.0003 - 0.0001,
                       life: Math.random(), alpha: Math.random()*0.4+0.1 });
    }

    function drawTile(col, row, type) {
      var px = isoX(col, row), py = isoY(col, row);
      var pal = palette[type];
      var c = pal[Math.abs(col*3+row*7) % pal.length];
      ctx.beginPath();
      ctx.moveTo(px,              py - TILE_H/2);
      ctx.lineTo(px + TILE_W/2,  py);
      ctx.lineTo(px,              py + TILE_H/2);
      ctx.lineTo(px - TILE_W/2,  py);
      ctx.closePath();
      ctx.fillStyle = c;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    function drawBuilding(b) {
      var px = isoX(b.col, b.row), py = isoY(b.col, b.row);
      var w2 = TILE_W / 2, h2 = TILE_H / 2;
      var bh = b.h + Math.sin(t * 0.5 + b.col) * 2;

      /* left face */
      ctx.beginPath();
      ctx.moveTo(px - w2, py);
      ctx.lineTo(px,      py + h2);
      ctx.lineTo(px,      py + h2 - bh);
      ctx.lineTo(px - w2, py - bh);
      ctx.closePath();
      ctx.fillStyle = shadeColor(b.hue, -30);
      ctx.fill();

      /* right face */
      ctx.beginPath();
      ctx.moveTo(px + w2, py);
      ctx.lineTo(px,      py + h2);
      ctx.lineTo(px,      py + h2 - bh);
      ctx.lineTo(px + w2, py - bh);
      ctx.closePath();
      ctx.fillStyle = shadeColor(b.hue, -10);
      ctx.fill();

      /* top face */
      ctx.beginPath();
      ctx.moveTo(px,      py - bh - h2);
      ctx.lineTo(px + w2, py - bh);
      ctx.lineTo(px,      py - bh + h2);
      ctx.lineTo(px - w2, py - bh);
      ctx.closePath();
      ctx.fillStyle = b.hue;
      ctx.fill();
    }

    function shadeColor(hex, pct) {
      var n = parseInt(hex.slice(1), 16);
      var r = Math.min(255, Math.max(0, (n >> 16) + pct));
      var g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + pct));
      var b2 = Math.min(255, Math.max(0, (n & 0xff) + pct));
      return 'rgb(' + r + ',' + g + ',' + b2 + ')';
    }

    var resources = { gold: 2400, food: 1850, wood: 3100, stone: 980 };
    var resTimer = 0;

    function frame() {
      t += 0.016;
      resTimer += 0.016;
      if (resTimer > 8) {
        resources.gold  += Math.floor(Math.random()*12+3);
        resources.food  += Math.floor(Math.random()*8+2);
        resources.wood  += Math.floor(Math.random()*15+4);
        resources.stone += Math.floor(Math.random()*5+1);
        resTimer = 0;
        document.getElementById('r-gold').textContent  = resources.gold.toLocaleString();
        document.getElementById('r-food').textContent  = resources.food.toLocaleString();
        document.getElementById('r-wood').textContent  = resources.wood.toLocaleString();
        document.getElementById('r-stone').textContent = resources.stone.toLocaleString();
      }

      ctx.clearRect(0, 0, W, H);

      /* Fog of war gradient */
      var fog = ctx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, H*0.8);
      fog.addColorStop(0,   'rgba(0,0,0,0)');
      fog.addColorStop(0.7, 'rgba(0,0,0,0.2)');
      fog.addColorStop(1,   'rgba(0,0,0,0.85)');

      /* Draw tiles */
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          drawTile(c, r, tileType(c, r));
        }
      }

      /* Particles */
      particles.forEach(function (p) {
        p.x += p.vx; p.y += p.vy; p.life -= 0.002;
        if (p.life <= 0 || p.y < 0.1) {
          p.x = Math.random(); p.y = 0.7 + Math.random()*0.2;
          p.life = Math.random(); p.alpha = Math.random()*0.3+0.1;
        }
        ctx.beginPath();
        ctx.arc(p.x * W, p.y * H, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200,160,20,' + (p.alpha * p.life) + ')';
        ctx.fill();
      });

      /* Buildings sorted back-to-front */
      buildings.sort(function(a,b){ return (a.col+a.row)-(b.col+b.row); });
      buildings.forEach(drawBuilding);

      /* Fog overlay */
      ctx.fillStyle = fog;
      ctx.fillRect(0, 0, W, H);

      /* Scanlines */
      for (var sy = 0; sy < H; sy += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        ctx.fillRect(0, sy, W, 1);
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
