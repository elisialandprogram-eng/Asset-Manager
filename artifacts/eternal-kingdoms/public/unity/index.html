<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Eternal Kingdoms</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>

    <script>
      "use strict";

      var canvas      = document.querySelector("#unity-canvas");
      var loadingBar  = document.querySelector("#unity-loading-bar");
      var progressFull = document.querySelector("#unity-progress-bar-full");
      var unityInstance = null;

      // ── Warning banner ────────────────────────────────────────────────────────
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        if (type === "error") {
          div.style.cssText = "background:red;padding:10px;";
          window.parent.postMessage({ type: "UNITY_LOAD_ERROR", message: msg }, "*");
        } else if (type === "warning") {
          div.style.cssText = "background:yellow;padding:10px;";
          setTimeout(function() { warningBanner.removeChild(div); updateVisibility(); }, 5000);
        }
        warningBanner.appendChild(div);
        updateVisibility();
      }

      // ── Canvas sizing ─────────────────────────────────────────────────────────
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.head.appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width  = "100vw";
        canvas.style.height = "100vh";
      }

      // ── Build config ──────────────────────────────────────────────────────────
      var buildUrl = "Build";
      var config = {
        arguments:          [],
        dataUrl:            buildUrl + "/EternalKingdoms.data.unityweb",
        frameworkUrl:       buildUrl + "/EternalKingdoms.framework.js.unityweb",
        codeUrl:            buildUrl + "/EternalKingdoms.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "EternalKingdoms",
        productName:        "Eternal Kingdoms",
        productVersion:     "1.0",
        showBanner:         unityShowBanner,
      };

      // ── Auth helpers ──────────────────────────────────────────────────────────

      /**
       * Forwards an auth token from the React parent to the Unity game.
       * Targets the "AuthManager" GameObject whose ReceiveAuthToken() method
       * is wired in AuthManager.cs.
       */
      function forwardAuthToken(token) {
        if (!unityInstance || !token) return;
        try {
          unityInstance.SendMessage("AuthManager", "ReceiveAuthToken", token);
          console.log("[EK-Bridge] Auth token forwarded to Unity AuthManager.");
        } catch(e) {
          console.warn("[EK-Bridge] SendMessage to AuthManager failed:", e);
        }
      }

      // ── Message bus ───────────────────────────────────────────────────────────

      // Listen for messages from the React parent frame.
      window.addEventListener("message", function(event) {
        if (!event.data) return;
        switch (event.data.type) {

          // React host sends the JWT after Unity signals UNITY_READY.
          case "UNITY_AUTH":
            forwardAuthToken(event.data.token || "");
            break;

          // React host can request a re-send of the auth token (retry).
          case "UNITY_AUTH_RETRY":
            forwardAuthToken(event.data.token || "");
            break;

          // React host can instruct Unity to go to a specific scene.
          case "UNITY_GOTO_SCENE":
            if (unityInstance && event.data.scene) {
              try {
                unityInstance.SendMessage("SceneController", "GoToScene", event.data.scene);
              } catch(e) {}
            }
            break;
        }
      });

      // Listen for UNITY_GAME_READY fired by NativeBridge.jslib.
      // Relay it to the parent React frame.
      window.addEventListener("UNITY_GAME_READY", function(event) {
        try {
          window.parent.postMessage({
            type: "UNITY_GAME_READY",
            mode: event.detail && event.detail.mode ? event.detail.mode : "unknown"
          }, "*");
        } catch(e) {}
      });

      // ── Loader ────────────────────────────────────────────────────────────────
      loadingBar.style.display = "block";

      var loaderScript = document.createElement("script");
      loaderScript.src = buildUrl + "/EternalKingdoms.loader.js";

      loaderScript.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          // Real download/compile progress from Unity — relay to React.
          progressFull.style.width = (100 * progress) + "%";
          try {
            window.parent.postMessage({ type: "UNITY_PROGRESS", value: progress }, "*");
          } catch(e) {}

        }).then(function(instance) {
          unityInstance = instance;
          loadingBar.style.display = "none";

          // Notify React that Unity engine is ready (loader+WASM done).
          try {
            window.parent.postMessage({ type: "UNITY_READY" }, "*");
          } catch(e) {}

          console.log("[EK-Bridge] Unity engine ready. RuntimeBootstrap will take over.");

        }).catch(function(message) {
          var msg = String(message);
          console.error("[EK-Bridge] createUnityInstance failed:", msg);
          try {
            window.parent.postMessage({ type: "UNITY_LOAD_ERROR", message: msg }, "*");
          } catch(e) {}
        });
      };

      loaderScript.onerror = function() {
        var msg = "Failed to load Unity loader script. Build files may be missing.";
        console.error("[EK-Bridge]", msg);
        try {
          window.parent.postMessage({ type: "UNITY_LOAD_ERROR", message: msg }, "*");
        } catch(e) {}
      };

      document.body.appendChild(loaderScript);
    </script>
  </body>
</html>
