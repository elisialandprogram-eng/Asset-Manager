name: Unity WebGL Build

on:
  push:
    branches: [main]
    paths:
      - 'unity-client/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # ✅ Proper cache setup (fixes Library warning)
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity-client/Library
          key: Library-WebGL-${{ hashFiles('unity-client/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Fix Workspace Permissions
        run: chmod -R 777 $GITHUB_WORKSPACE

      - name: Unity WebGL Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity-client
          targetPlatform: WebGL
          buildName: EternalKingdoms
          unityVersion: auto
          versioning: None

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-webgl-${{ github.sha }}
          path: build/WebGL
          retention-days: 30

      - name: Deploy build to public/unity
        run: |
          DEST="artifacts/eternal-kingdoms/public/unity"

          echo "Clearing $DEST..."
          rm -rf "$DEST"
          mkdir -p "$DEST"

          echo "Copying WebGL output..."
          if [ -d "build/WebGL" ]; then
            cp -r build/WebGL/. "$DEST/"
          else
            echo "No build folder found, creating fallback structure..."
            mkdir -p "$DEST"
          fi

          echo "Files deployed:"
          find "$DEST" -type f | sort