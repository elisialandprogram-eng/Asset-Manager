name: Unity WebGL Build

on:
  push:
    branches: [main]
    paths:
      - 'unity-client/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity-client/Library
          key: Library-WebGL-${{ hashFiles('unity-client/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Fix workspace permissions
        run: chmod -R 777 $GITHUB_WORKSPACE

      # Supports both Personal (UNITY_LICENSE) and Pro/Plus (UNITY_SERIAL).
      # Set whichever secret matches your Unity plan — the other can be empty.
      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL:   ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath:    unity-client
          targetPlatform: WebGL
          buildName:      EternalKingdoms
          buildsPath:     build
          buildMethod:    BuildScript.BuildWebGL
          unityVersion:   auto
          versioning:     None

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-webgl-${{ github.sha }}
          path: build/WebGL
          retention-days: 30

      - name: Deploy build to public/unity
        run: |
          DEST="artifacts/eternal-kingdoms/public/unity"
          echo "Clearing $DEST..."
          rm -rf "$DEST"
          mkdir -p "$DEST"
          echo "Copying WebGL output..."
          if [ -d "build/WebGL/EternalKingdoms" ]; then
            cp -r build/WebGL/EternalKingdoms/. "$DEST/"
          elif [ -d "build/WebGL" ]; then
            cp -r build/WebGL/. "$DEST/"
          else
            echo "ERROR: No WebGL build output found!"
            exit 1
          fi
          echo "Files deployed:"
          find "$DEST" -type f | sort

      - name: Commit built WebGL to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/eternal-kingdoms/public/unity
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: deploy Unity WebGL build [${{ github.sha }}]"
          git push
