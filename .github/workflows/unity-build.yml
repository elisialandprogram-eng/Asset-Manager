name: Unity WebGL Build

on:
  push:
    branches: [main]
    paths:
      - 'unity-client/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity-client/Library
          key: unity-library-webgl-${{ hashFiles('unity-client/Assets/**', 'unity-client/Packages/**', 'unity-client/ProjectSettings/**') }}
          restore-keys: |
            unity-library-webgl-
            unity-library-

      - name: Fix workspace permissions
        run: |
          chmod -R 777 $GITHUB_WORKSPACE
          sudo mkdir -p /home/packer
          sudo chmod -R 777 /home/packer

      # Spins up a virtual framebuffer inside the runner, logs in with your
      # Unity credentials, and claims a free Personal seat — no .ulf needed.
      - name: Activate Unity Personal license
        uses: RageAgainstThePixel/activate-unity-license@v1
        with:
          license:   'Personal'
          username:  ${{ secrets.UNITY_EMAIL }}
          password:  ${{ secrets.UNITY_PASSWORD }}

      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        with:
          projectPath:    unity-client
          targetPlatform: WebGL
          unityVersion:   6000.0.23f1
          buildName:      EternalKingdoms
          buildsPath:     ci-build
          buildMethod:    BuildScript.BuildWebGL
          versioning:     None
          allowDirtyBuild: true

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-webgl-${{ github.sha }}
          path: ci-build/WebGL/EternalKingdoms
          retention-days: 30

      - name: Deploy build to public/unity
        run: |
          DEST="artifacts/eternal-kingdoms/public/unity"
          echo "Clearing $DEST..."
          rm -rf "$DEST"
          mkdir -p "$DEST"
          echo "Copying WebGL output..."
          if [ -d "ci-build/WebGL/EternalKingdoms" ]; then
            cp -r ci-build/WebGL/EternalKingdoms/. "$DEST/"
          else
            echo "ERROR: No WebGL build output found at ci-build/WebGL/EternalKingdoms"
            exit 1
          fi
          echo "Files deployed:"
          find "$DEST" -type f | sort

      - name: Commit built WebGL to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/eternal-kingdoms/public/unity
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: deploy Unity WebGL build [${{ github.sha }}]"
          git push
