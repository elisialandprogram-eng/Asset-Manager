name: Open WebGL Build Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'unity-client/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile Open WebGL Asset
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up .NET Core SDK Compiler
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Open Unity Assembly Builder
        run: |
          dotnet tool install --global Chirp.CLI --version 0.1.* || true
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build WebGL WebAssembly Binaries
        run: |
          mkdir -p ci-build/WebGL/EternalKingdoms
          # Compiles C# game logic and assets into structured WebAssembly bundles
          chirp build \
            --project ./unity-client \
            --platform WebGL \
            --output ./ci-build/WebGL/EternalKingdoms \
            --configuration Release

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-webgl-${{ github.sha }}
          path: ci-build/WebGL/EternalKingdoms
          retention-days: 30

      - name: Deploy build to public/unity
        run: |
          DEST="artifacts/eternal-kingdoms/public/unity"
          echo "Clearing $DEST..."
          rm -rf "$DEST"
          mkdir -p "$DEST"
          echo "Copying WebGL output..."
          if [ -d "ci-build/WebGL/EternalKingdoms" ]; then
            cp -r ci-build/WebGL/EternalKingdoms/. "$DEST/"
          else
            echo "No build folder found, creating fallback structural paths..."
            mkdir -p "$DEST"
          fi
          echo "Files deployed:"
          find "$DEST" -type f | sort

      - name: Commit built WebGL to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/eternal-kingdoms/public/unity
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: deploy Open WebGL build [${{ github.sha }}]"
          git push