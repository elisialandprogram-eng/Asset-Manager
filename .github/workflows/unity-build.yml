name: Unity WebGL Build

on:
  push:
    branches: [main]
    paths:
      - 'unity-client/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity-client/Library
          key: Library-WebGL-${{ hashFiles('unity-client/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Fix workspace permissions
        run: chmod -R 777 $GITHUB_WORKSPACE

      # ── Step 1: Activate ──────────────────────────────────────────────────
      # game-ci/unity-activate spins up a virtual desktop inside the runner,
      # logs in with your Unity credentials, and claims a free Personal seat.
      # Requires only UNITY_EMAIL and UNITY_PASSWORD — no .ulf file needed.
      - name: Activate Unity license
        uses: game-ci/unity-activate@v2
        with:
          unityVersion: 6000.0.23f1
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # ── Step 2: Build ─────────────────────────────────────────────────────
      # skipActivation: true because we already activated above.
      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL:   ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath:     unity-client
          targetPlatform:  WebGL
          buildName:       EternalKingdoms
          buildsPath:      build
          buildMethod:     BuildScript.BuildWebGL
          unityVersion:    auto
          versioning:      None
          skipActivation:  true

      # ── Step 3: Return license ────────────────────────────────────────────
      # Always runs — returns the floating seat so the next build can use it.
      - name: Return Unity license
        uses: game-ci/unity-return-license@v2
        if: always()
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-webgl-${{ github.sha }}
          path: build/WebGL
          retention-days: 30

      - name: Deploy build to public/unity
        run: |
          DEST="artifacts/eternal-kingdoms/public/unity"
          echo "Clearing $DEST..."
          rm -rf "$DEST"
          mkdir -p "$DEST"
          echo "Copying WebGL output..."
          if [ -d "build/WebGL/EternalKingdoms" ]; then
            cp -r build/WebGL/EternalKingdoms/. "$DEST/"
          elif [ -d "build/WebGL" ]; then
            cp -r build/WebGL/. "$DEST/"
          else
            echo "ERROR: No WebGL build output found!"
            exit 1
          fi
          echo "Files deployed:"
          find "$DEST" -type f | sort

      - name: Commit built WebGL to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/eternal-kingdoms/public/unity
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: deploy Unity WebGL build [${{ github.sha }}]"
          git push
