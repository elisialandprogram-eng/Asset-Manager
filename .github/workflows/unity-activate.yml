name: Unity License Activation

# Run this workflow ONCE to obtain your UNITY_LICENSE secret.
#
# How it works:
#   Unity runs in a Docker container in batch mode to generate a
#   license request file (.alf). You upload that to Unity's portal
#   and get back a license file (.ulf) which becomes your secret.
#
# Steps:
#   1. Actions tab -> Unity License Activation -> Run workflow
#   2. Wait for it to finish, then download the "activation-file" artifact (.alf)
#   3. Go to https://license.unity3d.com, sign in, and upload the .alf file
#   4. Download the .ulf file Unity returns
#   5. Repo Settings -> Secrets -> Actions -> New repository secret
#        Name:  UNITY_LICENSE
#        Value: paste the ENTIRE contents of the .ulf file
#   6. You can now delete the artifact — it is a one-time request

on:
  workflow_dispatch:

jobs:
  activation:
    name: Generate Unity activation file
    runs-on: ubuntu-latest

    steps:
      - name: Generate .alf activation file
        run: |
          # Pull the GameCI Unity editor image for WebGL
          docker pull unityci/editor:ubuntu-6000.0.23f1-webgl-3

          # Run Unity headlessly to produce the activation request file
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            unityci/editor:ubuntu-6000.0.23f1-webgl-3 \
            bash -c "unity-editor -batchmode -createManualActivationFile -logfile /dev/stdout; exit 0"

          echo "Generated files:"
          ls -la Unity_*.alf 2>/dev/null || echo "No .alf file found — check logs above"

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: activation-file
          path: Unity_*.alf
          retention-days: 1
