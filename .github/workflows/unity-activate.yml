name: Unity License Setup (info only)

# Activation is now handled automatically inside unity-build.yml
# using RageAgainstThePixel/activate-unity-license@v1, which spins
# up a virtual framebuffer inside the GitHub runner and claims a
# free Personal seat directly — no .ulf file or portal needed.
#
# ── Secrets required (Settings → Secrets → Actions) ──────────────
#
#   UNITY_EMAIL     your Unity account email
#   UNITY_PASSWORD  your Unity account password
#
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

jobs:
  info:
    name: Activation handled automatically in unity-build.yml
    runs-on: ubuntu-latest
    steps:
      - name: Print info
        run: |
          echo "Activation is handled automatically by unity-build.yml"
          echo "using RageAgainstThePixel/activate-unity-license@v1."
          echo ""
          echo "Required secrets:"
          echo "  UNITY_EMAIL    — your Unity account email"
          echo "  UNITY_PASSWORD — your Unity account password"
