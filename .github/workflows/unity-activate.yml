name: Unity License Activation Generator

on:
  workflow_dispatch:

jobs:
  get-alf:
    name: Generate Authentic ALF Signature 🔑
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: view
        uses: game-ci/unity-request-activation-file@v4
        with:
          unityVersion: 6000.0.23f1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Activation-File
          path: ${{ steps.view.outputs.filePath }}