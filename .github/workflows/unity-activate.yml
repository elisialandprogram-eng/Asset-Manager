name: Unity License Activation

# Generates a Unity_lic.ulf license file by logging into Unity inside Docker.
# This avoids the Unity portal entirely (no .alf upload needed).
#
# Prerequisites — add these two secrets first:
#   UNITY_EMAIL     your Unity account email
#   UNITY_PASSWORD  your Unity account password
#
# Steps:
#   1. Add UNITY_EMAIL and UNITY_PASSWORD secrets to your repo
#      (Settings -> Secrets -> Actions -> New repository secret)
#   2. Actions tab -> Unity License Activation -> Run workflow
#   3. Download the "unity-license" artifact — it contains Unity_lic.ulf
#   4. Open the .ulf file in a text editor, copy the ENTIRE contents
#   5. Add a new secret:
#        Name:  UNITY_LICENSE
#        Value: paste the full .ulf file contents
#
# After that the unity-build.yml workflow will work.

on:
  workflow_dispatch:

jobs:
  activate:
    name: Activate Unity and export license
    runs-on: ubuntu-latest

    steps:
      - name: Activate Unity with credentials
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          mkdir -p /tmp/unity-license

          docker run --rm \
            -e UNITY_EMAIL="$UNITY_EMAIL" \
            -e UNITY_PASSWORD="$UNITY_PASSWORD" \
            -v /tmp/unity-license:/license \
            unityci/editor:ubuntu-6000.0.23f1-webgl-3 \
            bash -c "
              set -e
              echo 'Activating Unity personal license...'
              unity-editor \
                -batchmode \
                -nographics \
                -logfile /dev/stdout \
                -username \"\$UNITY_EMAIL\" \
                -password \"\$UNITY_PASSWORD\" \
                -quit || true

              echo 'Searching for license file...'
              find / -name 'Unity_lic.ulf' 2>/dev/null | head -5

              LIC=\$(find / -name 'Unity_lic.ulf' 2>/dev/null | head -1)
              if [ -n \"\$LIC\" ]; then
                cp \"\$LIC\" /license/Unity_lic.ulf
                echo 'License file exported successfully.'
              else
                echo 'ERROR: Unity_lic.ulf not found.'
                echo 'Unity may require interactive login or 2FA.'
                exit 1
              fi
            "

      - name: Upload license file
        uses: actions/upload-artifact@v4
        with:
          name: unity-license
          path: /tmp/unity-license/Unity_lic.ulf
          retention-days: 1
