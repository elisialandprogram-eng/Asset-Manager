name: Unity License Activation (info only)

# ══════════════════════════════════════════════════════════════════
# This workflow is now FOR REFERENCE ONLY.
#
# unity-build.yml handles activation automatically using
# game-ci/unity-activate@v4, which spins up a virtual desktop
# inside the GitHub runner, logs in with your Unity credentials,
# and claims a floating Personal seat — no .ulf file or portal needed.
#
# ── Secrets required in your repo ────────────────────────────────
#
#   UNITY_EMAIL     your Unity account email
#   UNITY_PASSWORD  your Unity account password
#
#   UNITY_SERIAL    (Pro/Plus only) your serial number
#                   Leave unset if you have a Personal plan
#
# Add them at: Settings → Secrets → Actions → New repository secret
#
# Once those two secrets are set, push any change to unity-client/
# and the build workflow will activate, build, and return the
# license automatically.
#
# ══════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:

jobs:
  info:
    name: Activation is handled automatically
    runs-on: ubuntu-latest
    steps:
      - name: Print info
        run: |
          echo "Activation is now handled inside unity-build.yml"
          echo "via game-ci/unity-activate@v4."
          echo ""
          echo "Required secrets:"
          echo "  UNITY_EMAIL    — your Unity account email"
          echo "  UNITY_PASSWORD — your Unity account password"
          echo "  UNITY_SERIAL   — Pro/Plus serial (leave unset for Personal)"
