<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#0f0500" rx="4"/>
  <!-- Fire breath -->
  <ellipse cx="30" cy="100" rx="35" ry="20" fill="#f97316" opacity="0.6"/>
  <ellipse cx="20" cy="100" rx="20" ry="12" fill="#fbbf24" opacity="0.8"/>
  <ellipse cx="8" cy="100" rx="10" ry="7" fill="#fde68a" opacity="0.9"/>
  <!-- Body -->
  <ellipse cx="170" cy="115" rx="80" ry="45" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <!-- Neck -->
  <path d="M 105 90 Q 80 70 60 90" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="60" cy="85" rx="35" ry="22" fill="#991b1b" stroke="#dc2626" stroke-width="2"/>
  <!-- Snout -->
  <ellipse cx="35" cy="92" rx="20" ry="12" fill="#b91c1c" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="78" rx="8" ry="6" fill="#fbbf24"/>
  <ellipse cx="52" cy="78" rx="4" ry="4" fill="#1f2937"/>
  <ellipse cx="68" cy="77" rx="8" ry="6" fill="#fbbf24"/>
  <ellipse cx="68" cy="77" rx="4" ry="4" fill="#1f2937"/>
  <!-- Horns -->
  <polygon points="55,65 45,40 62,60" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
  <polygon points="70,63 78,38 72,58" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Wings -->
  <path d="M 150 80 Q 200 20 260 40 Q 230 80 200 90 Z" fill="#991b1b" stroke="#dc2626" stroke-width="2" opacity="0.9"/>
  <path d="M 155 75 Q 200 35 250 50" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
  <path d="M 160 82 Q 205 50 245 62" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
  <!-- Wing left -->
  <path d="M 145 85 Q 100 30 60 50 Q 90 85 120 95 Z" fill="#991b1b" stroke="#dc2626" stroke-width="2" opacity="0.9"/>
  <!-- Spines on back -->
  <polygon points="150,75 155,55 160,75" fill="#dc2626" stroke="#f87171" stroke-width="1"/>
  <polygon points="170,72 175,50 180,72" fill="#dc2626" stroke="#f87171" stroke-width="1"/>
  <polygon points="190,74 195,53 200,74" fill="#dc2626" stroke="#f87171" stroke-width="1"/>
  <!-- Tail -->
  <path d="M 245 120 Q 275 140 270 165 Q 265 175 255 165" fill="none" stroke="#991b1b" stroke-width="8" stroke-linecap="round"/>
  <polygon points="255,165 270,175 260,155" fill="#dc2626"/>
  <!-- Legs -->
  <ellipse cx="120" cy="153" rx="16" ry="12" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="110" y="162" width="20" height="20" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <ellipse cx="210" cy="153" rx="16" ry="12" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="200" y="162" width="20" height="20" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <!-- Label -->
  <text x="140" y="198" font-family="serif" font-size="10" fill="#dc2626" text-anchor="middle">FIRE DRAGON</text>
</svg>
