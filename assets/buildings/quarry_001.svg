<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#111111" rx="4"/>
  <!-- Ground / pit -->
  <ellipse cx="100" cy="150" rx="80" ry="35" fill="#1f2937" stroke="#6b7280" stroke-width="2"/>
  <ellipse cx="100" cy="148" rx="60" ry="25" fill="#111827" stroke="#9ca3af" stroke-width="1"/>
  <!-- Stone blocks -->
  <rect x="30" y="120" width="30" height="22" fill="#374151" stroke="#9ca3af" stroke-width="1.5" rx="2"/>
  <rect x="70" y="115" width="35" height="28" fill="#4b5563" stroke="#9ca3af" stroke-width="1.5" rx="2"/>
  <rect x="115" y="120" width="25" height="22" fill="#374151" stroke="#9ca3af" stroke-width="1.5" rx="2"/>
  <!-- Crane arm -->
  <line x1="160" y1="50" x2="160" y2="140" stroke="#6b7280" stroke-width="4"/>
  <line x1="100" y1="50" x2="160" y2="50" stroke="#6b7280" stroke-width="4"/>
  <line x1="100" y1="50" x2="100" y2="115" stroke="#9ca3af" stroke-width="2"/>
  <!-- Base of crane -->
  <rect x="148" y="140" width="24" height="15" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <!-- Label -->
  <text x="100" y="195" font-family="serif" font-size="9" fill="#9ca3af" text-anchor="middle">QUARRY</text>
</svg>
