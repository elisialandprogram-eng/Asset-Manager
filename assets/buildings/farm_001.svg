<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0a1a0a" rx="4"/>
  <!-- Ground -->
  <rect x="10" y="140" width="180" height="50" fill="#14320a" stroke="#22c55e" stroke-width="1"/>
  <!-- Barn -->
  <rect x="120" y="100" width="65" height="50" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="120,100 185,100 152,70" fill="#991b1b" stroke="#f97316" stroke-width="1.5"/>
  <!-- Barn door -->
  <rect x="140" y="120" width="24" height="30" fill="#451a03" rx="1"/>
  <!-- Crop rows -->
  <line x1="15" y1="145" x2="110" y2="145" stroke="#22c55e" stroke-width="2"/>
  <line x1="15" y1="155" x2="110" y2="155" stroke="#22c55e" stroke-width="2"/>
  <line x1="15" y1="165" x2="110" y2="165" stroke="#22c55e" stroke-width="2"/>
  <!-- Wheat stalks -->
  <line x1="30" y1="145" x2="30" y2="120" stroke="#fbbf24" stroke-width="2"/>
  <ellipse cx="30" cy="118" rx="6" ry="10" fill="#d97706"/>
  <line x1="55" y1="145" x2="55" y2="115" stroke="#fbbf24" stroke-width="2"/>
  <ellipse cx="55" cy="113" rx="6" ry="10" fill="#d97706"/>
  <line x1="80" y1="145" x2="80" y2="120" stroke="#fbbf24" stroke-width="2"/>
  <ellipse cx="80" cy="118" rx="6" ry="10" fill="#d97706"/>
  <!-- Label -->
  <text x="100" y="195" font-family="serif" font-size="9" fill="#22c55e" text-anchor="middle">FARM</text>
</svg>
