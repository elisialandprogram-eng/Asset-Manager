<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#050a0f" rx="4"/>
  <!-- Tower base -->
  <rect x="65" y="130" width="70" height="55" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <!-- Tower body -->
  <rect x="80" y="60" width="40" height="80" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <!-- Roof with battlements -->
  <rect x="72" y="50" width="56" height="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <rect x="72" y="38" width="12" height="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="92" y="38" width="12" height="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="112" y="38" width="12" height="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Arrow slit windows -->
  <rect x="93" y="80" width="6" height="20" fill="#93c5fd" rx="3"/>
  <rect x="101" y="80" width="6" height="20" fill="#93c5fd" rx="3"/>
  <!-- Lookout light / torch -->
  <circle cx="100" cy="30" r="8" fill="#fbbf24" opacity="0.8"/>
  <circle cx="100" cy="30" r="5" fill="#fde68a"/>
  <!-- Glow rings -->
  <circle cx="100" cy="30" r="15" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="30" r="22" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <!-- Door -->
  <rect x="87" y="160" width="26" height="25" fill="#050a0f" rx="2"/>
  <!-- Label -->
  <text x="100" y="197" font-family="serif" font-size="9" fill="#3b82f6" text-anchor="middle">WATCH TOWER</text>
</svg>
