<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0f0e00" rx="4"/>
  <!-- Mountain gold-tinted -->
  <polygon points="100,20 180,160 20,160" fill="#1c1a00" stroke="#ca8a04" stroke-width="2"/>
  <polygon points="100,20 140,100 60,100" fill="#27240a" stroke="#ca8a04" stroke-width="1"/>
  <!-- Mine entrance -->
  <rect x="75" y="130" width="50" height="30" fill="#1c1a00" rx="3 3 0 0"/>
  <ellipse cx="100" cy="130" rx="25" ry="10" fill="#0f0e00"/>
  <!-- Support beams -->
  <line x1="75" y1="130" x2="75" y2="160" stroke="#92400e" stroke-width="4"/>
  <line x1="125" y1="130" x2="125" y2="160" stroke="#92400e" stroke-width="4"/>
  <line x1="75" y1="130" x2="125" y2="130" stroke="#92400e" stroke-width="4"/>
  <!-- Gold ore glints -->
  <circle cx="55" cy="90" r="8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="145" cy="80" r="6" fill="#fde68a" opacity="0.8"/>
  <circle cx="40" cy="125" r="7" fill="#f59e0b" opacity="0.7"/>
  <circle cx="160" cy="115" r="5" fill="#fbbf24" opacity="0.8"/>
  <!-- Sparkle -->
  <line x1="55" y1="82" x2="55" y2="98" stroke="#fde68a" stroke-width="1" opacity="0.9"/>
  <line x1="47" y1="90" x2="63" y2="90" stroke="#fde68a" stroke-width="1" opacity="0.9"/>
  <!-- Label -->
  <text x="100" y="197" font-family="serif" font-size="9" fill="#fbbf24" text-anchor="middle">GOLD MINE</text>
</svg>
