<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0f0f0f" rx="4"/>
  <!-- Mountain -->
  <polygon points="100,20 180,160 20,160" fill="#1c1c1e" stroke="#71717a" stroke-width="2"/>
  <polygon points="100,20 140,100 60,100" fill="#27272a" stroke="#71717a" stroke-width="1"/>
  <!-- Mine entrance -->
  <rect x="75" y="130" width="50" height="30" fill="#18181b" rx="3 3 0 0"/>
  <ellipse cx="100" cy="130" rx="25" ry="10" fill="#09090b"/>
  <!-- Support beams -->
  <line x1="75" y1="130" x2="75" y2="160" stroke="#92400e" stroke-width="4"/>
  <line x1="125" y1="130" x2="125" y2="160" stroke="#92400e" stroke-width="4"/>
  <line x1="75" y1="130" x2="125" y2="130" stroke="#92400e" stroke-width="4"/>
  <!-- Ore cart track -->
  <line x1="90" y1="160" x2="90" y2="175" stroke="#6b7280" stroke-width="2"/>
  <line x1="110" y1="160" x2="110" y2="175" stroke="#6b7280" stroke-width="2"/>
  <line x1="90" y1="165" x2="110" y2="165" stroke="#6b7280" stroke-width="2"/>
  <line x1="90" y1="175" x2="110" y2="175" stroke="#6b7280" stroke-width="2"/>
  <!-- Iron ore glint -->
  <circle cx="60" cy="90" r="6" fill="#6366f1" opacity="0.8"/>
  <circle cx="140" cy="80" r="4" fill="#818cf8" opacity="0.7"/>
  <circle cx="45" cy="120" r="5" fill="#4f46e5" opacity="0.6"/>
  <!-- Label -->
  <text x="100" y="197" font-family="serif" font-size="9" fill="#818cf8" text-anchor="middle">IRON MINE</text>
</svg>
