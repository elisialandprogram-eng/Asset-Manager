<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <rect width="120" height="160" fill="#0a0a0a" rx="4"/>
  <!-- Body -->
  <rect x="42" y="70" width="36" height="50" fill="#374151" stroke="#6b7280" stroke-width="1.5" rx="3"/>
  <!-- Head -->
  <circle cx="60" cy="55" r="18" fill="#d1a880" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Helmet -->
  <ellipse cx="60" cy="43" rx="19" ry="10" fill="#4b5563" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="53" cy="54" r="3" fill="#1f2937"/>
  <circle cx="67" cy="54" r="3" fill="#1f2937"/>
  <!-- Arms -->
  <rect x="20" y="72" width="22" height="10" fill="#374151" stroke="#6b7280" stroke-width="1" rx="3"/>
  <rect x="78" y="72" width="22" height="10" fill="#374151" stroke="#6b7280" stroke-width="1" rx="3"/>
  <!-- Weapon (pitchfork) -->
  <line x1="17" y1="40" x2="17" y2="85" stroke="#92400e" stroke-width="3"/>
  <line x1="12" y1="40" x2="12" y2="55" stroke="#9ca3af" stroke-width="2"/>
  <line x1="17" y1="40" x2="17" y2="55" stroke="#9ca3af" stroke-width="2"/>
  <line x1="22" y1="40" x2="22" y2="55" stroke="#9ca3af" stroke-width="2"/>
  <!-- Legs -->
  <rect x="45" y="118" width="13" height="30" fill="#1f2937" stroke="#374151" stroke-width="1" rx="2"/>
  <rect x="62" y="118" width="13" height="30" fill="#1f2937" stroke="#374151" stroke-width="1" rx="2"/>
  <!-- Label -->
  <text x="60" y="158" font-family="serif" font-size="8" fill="#9ca3af" text-anchor="middle">MILITIA</text>
</svg>
