<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <rect width="120" height="160" fill="#0a0a0a" rx="4"/>
  <!-- Light body -->
  <rect x="42" y="68" width="36" height="50" fill="#1c1917" stroke="#57534e" stroke-width="1.5" rx="3"/>
  <!-- Head -->
  <circle cx="60" cy="52" r="16" fill="#d4a574" stroke="#57534e" stroke-width="1.5"/>
  <!-- Bandana -->
  <rect x="44" y="46" width="32" height="8" fill="#b45309" stroke="#92400e" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="53" cy="52" r="3" fill="#1f2937"/>
  <circle cx="67" cy="52" r="3" fill="#1f2937"/>
  <!-- Binocular prop (optional) -->
  <rect x="55" y="55" width="10" height="5" fill="#4b5563" rx="1"/>
  <!-- Arms -->
  <rect x="18" y="70" width="24" height="8" fill="#1c1917" stroke="#57534e" stroke-width="1" rx="3"/>
  <rect x="78" y="70" width="24" height="8" fill="#1c1917" stroke="#57534e" stroke-width="1" rx="3"/>
  <!-- Dagger -->
  <line x1="15" y1="55" x2="15" y2="80" stroke="#6b7280" stroke-width="2"/>
  <polygon points="15,50 12,58 18,58" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
  <!-- Legs - running pose -->
  <rect x="43" y="115" width="13" height="30" fill="#1c1917" stroke="#44403c" stroke-width="1" rx="2" transform="rotate(-10, 50, 125)"/>
  <rect x="64" y="115" width="13" height="30" fill="#1c1917" stroke="#44403c" stroke-width="1" rx="2" transform="rotate(10, 70, 125)"/>
  <!-- Label -->
  <text x="60" y="157" font-family="serif" font-size="8" fill="#78716c" text-anchor="middle">SCOUT</text>
</svg>
